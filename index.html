<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カウントダウンタイマー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Inter:wght@300;400;500&family=Poppins:wght@300&family=Oswald:wght@300&family=Rajdhani:wght@300&family=Orbitron:wght@400&display=swap" rel="stylesheet">
  <!-- DSEG: 7セグメント液晶フォント (SIL OFL) -->
  <link href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --void:    #060710;   /* deep blue-black void */
      --surface: #0d0c1c;   /* setup card */
      --border:  #181628;   /* hairline borders */
      --num:     #c2d6ff;   /* cold tungsten digit color */
      --sep:     #4a5a94;   /* colon separators */
      --label:   #38426a;   /* dim labels */
      --steel:   #5a6a9a;   /* secondary text */
      --ring:    #1a2548;   /* ring fill — normal */
      --action:  #2e5fcc;   /* start button — cool blue */
      --amber:   #ffb054;   /* warning state */
      --red:     #ff6b6b;   /* danger state */
      --digit-scale: 1;
      --digit-font: 'Inter', sans-serif;
      --digit-w: 0.61em;
    }

    /* ── Light theme ───────────────────────────────────────── */
    body.light-theme {
      --void:    #f4f3ef;
      --surface: #eae9e4;
      --border:  #d0cdc5;
      --sep:     #a09890;
      --label:   #807868;
      --steel:   #585048;
    }

    body.light-theme #screen-timer {
      background: radial-gradient(ellipse 62% 58% at 50% 50%, #eeecea 0%, var(--void) 72%);
    }

    body.light-theme .tool-btn {
      background: rgba(0,0,0,0.04);
    }

    body.light-theme .tool-btn:hover {
      background: rgba(0,0,0,0.09);
      color: #1a1510;
    }

    /* ── Toolbar ───────────────────────────────────────────── */
    .toolbar {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      display: flex;
      gap: 0.35rem;
      z-index: 10;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.1rem;
      height: 2.1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--steel);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .tool-btn:hover { background: rgba(255,255,255,0.07); color: var(--num); }
    .tool-btn:disabled { opacity: 0.25; cursor: default; }
    .tool-btn:disabled:hover { background: transparent; color: var(--steel); }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--void);
      color: var(--num);
      min-height: 100vh;
      display: flex;
      padding: 1.2rem 0;
    }

    /* ── SETUP SCREEN ──────────────────────────────────────── */
    #screen-setup {
      position: relative;
      /* margin:auto = 収まるときは中央、はみ出すときは切れずにスクロール */
      margin: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.6rem 2.4rem 2.2rem;
      width: min(92vw, 430px);
    }

    .setup-theme {
      position: absolute;
      top: 1rem;
      right: 1rem;
    }

    .setup-wordmark {
      text-align: center;
      margin-bottom: 2.4rem;
    }

    .setup-wordmark h1 {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 0.36em;
      color: var(--steel);
      text-transform: uppercase;
    }

    .field { margin-bottom: 1.9rem; }

    .field-label {
      display: block;
      font-size: 0.92rem;
      letter-spacing: 0.22em;
      color: var(--steel);
      text-transform: uppercase;
      margin-bottom: 0.7rem;
    }

    #inp-name {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--num);
      font-family: 'Inter', sans-serif;
      font-size: 1.3rem;
      font-weight: 400;
      padding: 0.45rem 0;
      outline: none;
      transition: border-color 0.25s;
    }

    #inp-name::placeholder { color: var(--label); }
    #inp-name:focus { border-bottom-color: var(--action); }

    .time-row {
      display: flex;
      align-items: flex-end;
    }

    .time-unit { flex: 1; text-align: center; }

    .unit-sub {
      display: block;
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      color: var(--steel);
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }

    .time-unit input {
      display: block;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--num);
      font-family: var(--digit-font);
      font-variant-numeric: tabular-nums;
      font-weight: 300;
      font-size: 2.2rem;
      text-align: center;
      padding: 0.28rem 0.1rem;
      outline: none;
      cursor: text;
      transition: border-color 0.25s, background 0.25s;
      -moz-appearance: textfield;
    }

    .time-unit input:hover { border-color: #2a3454; }
    .time-unit input:focus { border-color: var(--action); background: rgba(255,255,255,0.07); }

    body.light-theme .time-unit input { background: rgba(0,0,0,0.04); }
    body.light-theme .time-unit input:hover { border-color: #a8a094; }
    body.light-theme .time-unit input:focus { background: rgba(0,0,0,0.02); }
    .time-unit input::-webkit-inner-spin-button { display: none; }

    /* ── Time presets ──────────────────────────────────────── */
    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.9rem;
    }

    .preset-btn {
      flex: 1 1 calc(25% - 0.4rem);
      padding: 0.42rem 0.2rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--steel);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .preset-btn:hover { border-color: #262440; color: var(--num); }

    .t-dot {
      font-family: 'DM Mono', monospace;
      font-size: 1.5rem;
      color: var(--sep);
      padding: 0 0.2rem 0.42rem;
      flex-shrink: 0;
    }

    /* ── Format picker ─────────────────────────────────────── */
    .fmt-row {
      display: flex;
      gap: 0.5rem;
    }

    .fmt-btn {
      flex: 1;
      padding: 0.48rem 0.5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--steel);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .fmt-btn.selected {
      border-color: var(--action);
      color: var(--num);
      background: rgba(46, 95, 204, 0.1);
    }

    .fmt-btn:hover:not(.selected) { border-color: #262440; color: var(--num); }

    /* ── Color picker ──────────────────────────────────────── */
    .color-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.4rem;
    }

    .swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      outline: none;
      flex-shrink: 0;
    }

    .swatch:hover { transform: scale(1.15); }

    .swatch.selected {
      box-shadow: 0 0 0 2px var(--void), 0 0 0 4px currentColor;
    }

    /* ── Font picker ───────────────────────────────────────── */
    .font-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .font-btn {
      flex: 1 1 calc(33.3% - 0.5rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.55rem 0.3rem 0.45rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--num);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .font-btn .fb-sample {
      font-size: 1.35rem;
      font-weight: 300;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .font-btn .fb-name {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: var(--steel);
    }

    .font-btn.selected {
      border-color: var(--action);
      background: rgba(46, 95, 204, 0.1);
    }

    .font-btn:hover:not(.selected) { border-color: #262440; }

    .btn-go {
      display: block;
      width: 100%;
      margin-top: 2.2rem;
      padding: 0.82rem;
      background: var(--action);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter 0.2s, transform 0.14s;
    }

    .btn-go:hover  { filter: brightness(1.18); transform: translateY(-1px); }
    .btn-go:active { transform: translateY(0); }

    /* ── Advanced settings (collapsible) ───────────────────── */
    .adv-toggle {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.6rem 0 0.2rem;
      background: transparent;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--steel);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-align: center;
      cursor: pointer;
      transition: color 0.2s;
    }

    .adv-toggle:hover { color: var(--num); }

    .field-color { margin-top: 1.9rem; margin-bottom: 0.4rem; }

    #adv-body { display: none; margin-top: 1.5rem; }
    #adv-body.open { display: block; }
    #adv-body .field:last-child { margin-bottom: 0.3rem; }

    /* ── Sound picker ──────────────────────────────────────── */
    .sound-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .sound-btn {
      flex: 1 1 calc(33.3% - 0.5rem);
      padding: 0.5rem 0.3rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--steel);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .sound-btn.selected {
      border-color: var(--action);
      color: var(--num);
      background: rgba(46, 95, 204, 0.1);
    }

    .sound-btn:hover:not(.selected) { border-color: #262440; color: var(--num); }

    /* ── TIMER SCREEN ──────────────────────────────────────── */
    #screen-timer {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* subtle center glow: depth without a card */
      background: radial-gradient(ellipse 62% 58% at 50% 50%, #080c1e 0%, var(--void) 72%);
    }

    /* The precision ring — SVG, centered, behind digits */
    #ring-svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(84vw, 84vh);
      height: min(84vw, 84vh);
      pointer-events: none;
    }

    .timer-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #lbl-name {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--steel);
      text-transform: uppercase;
      margin-bottom: 1.4rem;
      min-height: 1em;
    }

    /* ── THE NUMBER ─────────────────────────────────────────── */
    #lbl-time {
      display: flex;
      align-items: center;
      font-family: var(--digit-font);
      font-variant-numeric: tabular-nums;
      font-weight: 300;
      font-size: calc(clamp(4.5rem, 17vmin, 10.5rem) * var(--digit-scale));
      color: var(--num);
      line-height: 1;
      letter-spacing: -0.015em;
      transition: color 0.9s ease, text-shadow 0.9s ease, font-size 0.25s ease;
      text-shadow: 0 0 70px rgba(194, 214, 255, 0.12);
    }

    #lbl-time.t-warn {
      color: var(--amber);
      text-shadow: 0 0 70px rgba(255, 176, 84, 0.45);
    }

    #lbl-time.t-danger {
      color: var(--red);
      text-shadow: 0 0 70px rgba(255, 107, 107, 0.55);
    }

    #lbl-time.t-done {
      color: #ffffff;
      text-shadow: 0 0 90px rgba(255, 255, 255, 0.38);
    }

    .digit {
      display: inline-block;
      width: var(--digit-w, 0.61em);
      text-align: center;
      will-change: transform, opacity;
    }

    @keyframes digitDrop {
      0%   { opacity: 0; transform: translateY(-0.22em); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .digit.tick {
      animation: digitDrop 0.26s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 一時停止中: ゆっくり点滅 */
    #lbl-time.t-paused {
      animation: pausedBlink 1.8s ease-in-out infinite;
    }

    @keyframes pausedBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }


    .t-colon {
      font-size: 0.46em;
      color: var(--sep);
      margin: 0 0.06em 0.04em;
      line-height: 1;
    }

    /* ── CONTROLS ───────────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 0.65rem;
      margin-top: 3rem;
      align-items: center;
    }

    .btn-ctrl {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter 0.2s, transform 0.14s, background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-ctrl:hover  { filter: brightness(1.18); transform: translateY(-1px); }
    .btn-ctrl:active { transform: translateY(0); }

    #btn-toggle {
      background: var(--action);
      color: #fff;
      padding: 0.7rem 2.8rem;
    }

    #btn-toggle.is-running {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--steel);
    }

    #btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--label);
      padding: 0.7rem 1.2rem;
    }

    #btn-reset:hover { color: var(--steel); border-color: #262440; }

    #kbd-hint {
      margin-top: 1rem;
      font-size: 0.57rem;
      letter-spacing: 0.16em;
      color: var(--border);
      text-transform: uppercase;
    }

    #btn-back {
      display: block;
      background: none;
      border: none;
      color: var(--label);
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 2.4rem;
      padding: 0.5rem;
      transition: color 0.2s;
    }

    #btn-back:hover { color: var(--steel); }

    /* ── FINISH OVERLAY ─────────────────────────────────────── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6, 7, 16, 0.93);
      backdrop-filter: blur(18px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      z-index: 400;
    }

    #overlay.show { display: flex; }

    .ov-glyph {
      font-size: 1.8rem;
      letter-spacing: 0.55rem;
      color: var(--steel);
      animation: glyphLift 3.8s ease-in-out infinite;
    }

    @keyframes glyphLift {
      0%, 100% { transform: translateY(0); opacity: 0.55; }
      50%       { transform: translateY(-9px); opacity: 1; }
    }

    .ov-title {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: 3rem;
      letter-spacing: 0.04em;
      color: var(--num);
      margin-top: 0.3rem;
    }

    .ov-sub {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      color: var(--steel);
      margin-bottom: 1.6rem;
    }

    .btn-mute {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.78rem 2.8rem;
      cursor: pointer;
      transition: background 0.22s, color 0.22s, transform 0.14s;
    }

    .btn-mute:hover { background: var(--red); color: #fff; transform: translateY(-1px); }
    .btn-mute:active { transform: translateY(0); }

    /* ── Accessibility ──────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .digit.tick { animation: none; }
      #ring-fill  { transition: none !important; }
      .ov-glyph   { animation: none; opacity: 1; }
    }

    /* ── Touch devices: キーボードヒントを非表示・タップ領域を拡大 ── */
    @media (pointer: coarse) {
      #kbd-hint { display: none; }

      .tool-btn {
        width: 2.6rem;
        height: 2.6rem;
      }

      .btn-ctrl { padding-top: 0.85rem; padding-bottom: 0.85rem; }
    }

    /* ── Mobile portrait ────────────────────────────────────── */
    @media (max-width: 600px) {
      /* セットアップ画面の余白を詰める */
      .field { margin-bottom: 1.4rem; }
      .btn-go { margin-top: 1.6rem; }

      /* リングを少し小さくして呼吸感を出す */
      #ring-svg {
        width: min(76vw, 76vh);
        height: min(76vw, 76vh);
      }

      /* テスト名ラベルを小さく */
      #lbl-name {
        font-size: 1.1rem;
        letter-spacing: 0.12em;
        margin-bottom: 0.9rem;
      }

      /* コントロールの上余白を縮める */
      .controls { margin-top: 1.8rem; }

      /* 戻るボタンの上余白を縮める */
      #btn-back { margin-top: 1.4rem; }

      /* ツールバーを端に寄せる */
      .toolbar { top: 0.6rem; right: 0.6rem; }

      /* 終了オーバーレイのテキストを縮める */
      .ov-title { font-size: 2.2rem; }
      .ov-sub   { font-size: 0.95rem; }
    }

    /* ── Mobile landscape: 縦幅が狭いので全体を圧縮 ────────────── */
    @media (max-height: 500px) {
      #ring-svg {
        width: min(72vh, 72vw);
        height: min(72vh, 72vw);
      }

      #lbl-name { font-size: 0.9rem; margin-bottom: 0.4rem; }
      .controls { margin-top: 0.9rem; }
      #btn-back  { margin-top: 0.7rem; }
    }
  </style>
</head>
<body>

<!-- ── Setup ──────────────────────────────────── -->
<div id="screen-setup">
  <button class="tool-btn setup-theme" onclick="toggleTheme()" title="背景切り替え">◑</button>
  <div class="setup-wordmark">
    <h1>Countdown Timer</h1>
  </div>

  <div class="field">
    <label class="field-label" for="inp-name">テスト名</label>
    <input type="text" id="inp-name" placeholder="例：数学期末テスト" autocomplete="off" />
  </div>

  <div class="field">
    <label class="field-label">テスト時間（タップして自由に入力）</label>
    <div class="time-row">
      <div class="time-unit" id="unit-h">
        <span class="unit-sub">時間</span>
        <input type="number" inputmode="numeric" id="inp-h" min="0" max="23" value="0" />
      </div>
      <span class="t-dot" id="dot-h">:</span>
      <div class="time-unit">
        <span class="unit-sub">分</span>
        <input type="number" inputmode="numeric" id="inp-m" min="0" max="59" value="10" />
      </div>
      <span class="t-dot">:</span>
      <div class="time-unit">
        <span class="unit-sub">秒</span>
        <input type="number" inputmode="numeric" id="inp-s" min="0" max="59" value="0" />
      </div>
    </div>
    <div class="preset-row">
      <button class="preset-btn" onclick="setPreset(5)">5分</button>
      <button class="preset-btn" onclick="setPreset(10)">10分</button>
      <button class="preset-btn" onclick="setPreset(15)">15分</button>
      <button class="preset-btn" onclick="setPreset(30)">30分</button>
      <button class="preset-btn" onclick="setPreset(35)">35分</button>
      <button class="preset-btn" onclick="setPreset(45)">45分</button>
      <button class="preset-btn" onclick="setPreset(50)">50分</button>
      <button class="preset-btn" onclick="setPreset(60)">60分</button>
    </div>
  </div>

  <button class="btn-go" onclick="doSetup()">タイマーを設定する</button>

  <div class="field field-color">
    <label class="field-label">数字の色</label>
    <div class="color-row" id="color-row"></div>
  </div>

  <button class="adv-toggle" id="adv-toggle" onclick="toggleAdv()">詳細設定（フォント・表示形式・音）▾</button>
  <div id="adv-body">

  <div class="field">

<div id="screen-timer">

  <!--
    Precision ring: a thin SVG circle that drains counter-clockwise
    as time passes — like the dial face of a precision stopwatch.
    r=185  →  circumference ≈ 1162.4
  -->
  <svg id="ring-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
        <feGaussianBlur stdDeviation="3" result="blur1"/>
        <feGaussianBlur stdDeviation="6" result="blur2"/>
        <feMerge>
          <feMergeNode in="blur2"/>
          <feMergeNode in="blur1"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <!-- Dim track (always full circle) -->
    <circle id="ring-track" cx="200" cy="200" r="185"
      fill="none" stroke="#0c1020" stroke-width="3"/>
    <!-- Remaining-time arc (depletes counter-clockwise from 12 o'clock) -->
    <circle id="ring-fill" cx="200" cy="200" r="185"
      fill="none" stroke="#1a2548" stroke-width="2.5"
      stroke-linecap="round"
      transform="rotate(-90 200 200)"
      filter="url(#glow)"
      style="stroke-dasharray:1162.4; stroke-dashoffset:0;
             transition: stroke-dashoffset 1s linear, stroke 0.9s ease;"/>

<script>
// ── State ──────────────────────────────────────────────────────────
let chosenColor = '#c2d6ff';
let chosenSound = 'musicbox';
let displayFmt = 'hms'; // 'hms' | 'ms'
let totalSec = 0, remainSec = 0, hasHours = false;
let timerID = null, running = false;
let prevDigits = [];

// Audio
let audioCtx = null, masterGain = null, reverbNode = null, reverbGain = null;
let musicTimeout = null, musicNodes = [];

// Ring geometry: r=185 → C = 2π × 185
const RING_C = 1162.4;

// ── Format picker ────────────────────────────────────────────────────
function selectFmt(el) {
  document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  displayFmt = el.dataset.fmt;
  const hUnit = document.getElementById('unit-h');
  const hDot  = document.getElementById('dot-h');
  const inpM  = document.getElementById('inp-m');
  if (displayFmt === 'ms') {
    hUnit.style.display = 'none';
    hDot.style.display  = 'none';
    inpM.max = 99;
    document.getElementById('inp-h').value = 0;
  } else {
    hUnit.style.display = '';
    hDot.style.display  = '';
    inpM.max = 59;
    if (+inpM.value > 59) inpM.value = 59;
  }
}

// ── Color picker（背景テーマごとに別パレット・別記憶） ─────────────────
const PALETTES = {
  dark: [
    ['#c2d6ff', 'アイスブルー'],
    ['#a8f0c0', 'ミント'],
    ['#d4b8ff', 'ラベンダー'],
    ['#ffd580', 'ゴールド'],
    ['#ff9f7f', 'コーラル'],
  ],
  light: [
    ['#2255cc', 'コバルト'],
    ['#1a9950', 'エメラルド'],
    ['#6a3fb5', 'パープル'],
    ['#b8322f', 'えんじ'],
    ['#333a45', '墨'],
  ],
};

let chosenColorByTheme = { dark: '#c2d6ff', light: '#2255cc' };

function currentTheme() { return isLight ? 'light' : 'dark'; }

function renderPalette() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  const sel = chosenColorByTheme[currentTheme()];
  for (const [c, name] of PALETTES[currentTheme()]) {
    const b = document.createElement('button');
    b.className = 'swatch' + (c === sel ? ' selected' : '');
    b.dataset.color = c;
    b.title = name;
    b.style.background = c;
    b.style.color = c;
    b.onclick = () => selectColor(b);
    row.appendChild(b);
  }
}

// 選択色を画面全体（数字・コロン・リング・ラベル）に反映
function applyChosenColor() {
  document.documentElement.style.setProperty('--num', chosenColor);
  document.documentElement.style.setProperty('--sep', sepColor(chosenColor));
  document.documentElement.style.setProperty('--ring', dimColor(chosenColor));
  const mid = midColor(chosenColor);
  document.getElementById('lbl-name').style.color = mid;
  document.querySelector('.ov-sub').style.color = mid;
  document.querySelector('.ov-glyph').style.color = mid;
}

function selectColor(el) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  chosenColor = el.dataset.color;
  chosenColorByTheme[currentTheme()] = chosenColor;
  applyChosenColor();
}

// ── Font picker ─────────────────────────────────────────────────────
function selectFont(el) {
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.documentElement.style.setProperty('--digit-font', el.dataset.font);
  document.documentElement.style.setProperty('--digit-w', el.dataset.w);
}

// ── Advanced settings toggle ────────────────────────────────────────
function toggleAdv() {
  const open = document.getElementById('adv-body').classList.toggle('open');
  document.getElementById('adv-toggle').textContent =
    open ? '詳細設定（フォント・表示形式・音）▴' : '詳細設定（フォント・表示形式・音）▾';
}

// ── Sound picker（選択と同時に試聴） ─────────────────────────────────
function selectSound(el, silent) {
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  chosenSound = el.dataset.sound;
  if (silent) return;
  initAudio();
  const t0 = audioCtx.currentTime + 0.05;
  // D メジャーのアルペジオを一節
  playNote(N.D5,  t0,        0.5, 0.5);
  playNote(N.FS5, t0 + 0.22, 0.5, 0.5);
  playNote(N.A5,  t0 + 0.44, 0.7, 0.5);
}

// ── Time presets ────────────────────────────────────────────────────
function setPreset(min) {
  if (displayFmt === 'ms' && min > 99) min = 99;
  document.getElementById('inp-h').value = displayFmt === 'ms' ? 0 : Math.floor(min / 60);
  document.getElementById('inp-m').value = displayFmt === 'ms' ? min : min % 60;
  document.getElementById('inp-s').value = 0;
}

// ── Settings persistence (同一PC・同一ブラウザ内) ────────────────────
const LS_KEY = 'cdtimer-settings';

function saveSettings() {
  try {
    const fontBtn = document.querySelector('.font-btn.selected');
    localStorage.setItem(LS_KEY, JSON.stringify({
      name: document.getElementById('inp-name').value,
      h: +document.getElementById('inp-h').value || 0,
      m: +document.getElementById('inp-m').value || 0,
      s: +document.getElementById('inp-s').value || 0,
      fmt: displayFmt,
      colors: chosenColorByTheme,
      font: fontBtn ? fontBtn.dataset.font : null,
      sound: chosenSound,
      light: isLight,
    }));
  } catch (_) {}
}

function restoreSettings() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch (_) {}
  if (!saved) return;
  if (saved.fmt) {
    const b = document.querySelector(`.fmt-btn[data-fmt="${saved.fmt}"]`);
    if (b) selectFmt(b);
  }
  if (saved.name) document.getElementById('inp-name').value = saved.name;
  // 時間は fmt 復元後にセット（selectFmt が h をリセットするため）
  document.getElementById('inp-h').value = saved.h || 0;
  document.getElementById('inp-m').value = saved.m || 0;
  document.getElementById('inp-s').value = saved.s || 0;
  if (saved.colors) {
    chosenColorByTheme = Object.assign(chosenColorByTheme, saved.colors);
  } else if (saved.color) {
    // 旧形式からの引き継ぎ: どちらのパレットの色か判定して振り分け
    const theme = PALETTES.light.some(([c]) => c === saved.color) ? 'light' : 'dark';
    chosenColorByTheme[theme] = saved.color;
  }
  if (saved.font) {
    const fb = Array.from(document.querySelectorAll('.font-btn')).find(b => b.dataset.font === saved.font);
    if (fb) selectFont(fb);
  }
  if (saved.sound) {
    const sb = document.querySelector(`.sound-btn[data-sound="${saved.sound}"]`);
    if (sb) selectSound(sb, true);
  }
  if (saved.light) toggleTheme();
}

// 選択色の中間トーン（テスト名用：同系色・やや暗め）
function midColor(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  const l = (max + min) / 2;
  let h = 0, s = 0;
  if (d > 0) {
    s = d / (l > 0.5 ? 2 - max - min : max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return `hsl(${Math.round(h * 360)}, ${Math.round(s * 50)}%, 45%)`;
}

// 選択色のトーンを落とした ring 色を計算（同系色・暗め・くすみ）
function dimColor(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  const l = (max + min) / 2;
  let h = 0, s = 0;
  if (d > 0) {
    s = d / (l > 0.5 ? 2 - max - min : max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  // 同じ色相、彩度を約65%、明度を 25% 前後に落とす
  return `hsl(${Math.round(h * 360)}, ${Math.round(s * 65)}%, 25%)`;
}

// コロン用の明るめトーン（同系色・数字よりやや控えめ）
function sepColor(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  const l = (max + min) / 2;
  let h = 0, s = 0;
  if (d > 0) {
    s = d / (l > 0.5 ? 2 - max - min : max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return `hsl(${Math.round(h * 360)}, ${Math.round(s * 60)}%, 58%)`;
}

// ── Setup ───────────────────────────────────────────────────────────
function doSetup() {
  const name = document.getElementById('inp-name').value.trim() || 'テスト';
  const h = clamp(+document.getElementById('inp-h').value || 0, 0, 23);
  const m = displayFmt === 'ms'
    ? clamp(+document.getElementById('inp-m').value || 0, 0, 99)
    : clamp(+document.getElementById('inp-m').value || 0, 0, 59);
  const s = clamp(+document.getElementById('inp-s').value || 0, 0, 59);

  totalSec = h * 3600 + m * 60 + s;
  if (totalSec <= 0) { alert('時間を入力してください'); return; }
  if (displayFmt === 'ms' && totalSec > 5999) { alert('分：秒モードでは最大99分59秒まで設定できます'); return; }

  hasHours = displayFmt === 'hms' && h > 0;
  remainSec = totalSec;
  prevDigits = [];
  saveSettings();

  applyChosenColor();
  document.getElementById('lbl-name').textContent = name;
  document.getElementById('screen-setup').style.display = 'none';
  document.getElementById('screen-timer').style.display = 'flex';
  fitName();

  setBtn('ready');
  buildDigits();
  renderTime(true);
}

// テスト名が長いときはリングに収まるまで縮小
function fitName() {
  const el = document.getElementById('lbl-name');
  el.style.fontSize = ''; // いったんCSS既定値に戻してから測る
  const maxW = Math.min(window.innerWidth, window.innerHeight) * 0.58;
  let size = parseFloat(getComputedStyle(el).fontSize);
  while (el.scrollWidth > maxW && size > 14) {
    size -= 2;
    el.style.fontSize = size + 'px';
  }
}

window.addEventListener('resize', () => {
  if (document.getElementById('screen-timer').style.display === 'flex') fitName();
});

function goBack() {
  pauseTimer();
  stopMusic();
  document.getElementById('screen-setup').style.display = '';
  document.getElementById('screen-timer').style.display = 'none';
  document.getElementById('overlay').classList.remove('show');
}

// ── Timer control ───────────────────────────────────────────────────
function toggleTimer() { running ? pauseTimer() : startTimer(); }

function startTimer() {
  if (remainSec <= 0) return;
  initAudio();
  running = true;
  setBtn('running');
  timerID = setInterval(() => {
    remainSec--;
    renderTime();
    if (remainSec <= 0) { clearInterval(timerID); running = false; onFinish(); }
  }, 1000);
}

function pauseTimer() {
  running = false;
  clearInterval(timerID);
  setBtn('paused');
}

function resetTimer() {
  pauseTimer();
  remainSec = totalSec;
  prevDigits = [];
  setBtn('ready');
  buildDigits();
  renderTime(true);
}

function setBtn(state) {
  const b = document.getElementById('btn-toggle');
  const lbl = document.getElementById('lbl-time');
  b.classList.remove('is-running');
  lbl.classList.remove('t-paused');
  if (state === 'running')     { b.textContent = '停止'; b.classList.add('is-running'); }
  else if (state === 'paused') { b.textContent = '再開'; if (remainSec > 0) lbl.classList.add('t-paused'); }
  else                         { b.textContent = '開始'; }
}

// ── Digit DOM ───────────────────────────────────────────────────────
function buildDigits() {
  const el = document.getElementById('lbl-time');
  el.innerHTML = '';
  const groups = hasHours ? 3 : 2;
  for (let g = 0; g < groups; g++) {
    if (g > 0) {
      const sep = document.createElement('span');
      sep.className = 't-colon';
      sep.textContent = ':';
      el.appendChild(sep);
    }
    for (let d = 0; d < 2; d++) {
      const span = document.createElement('span');
      span.className = 'digit';
      span.textContent = '0';
      el.appendChild(span);
    }
  }
}

// ── Render ──────────────────────────────────────────────────────────
function renderTime(instant = false) {
  const h = Math.floor(remainSec / 3600);
  const m = displayFmt === 'ms'
    ? Math.floor(remainSec / 60)
    : Math.floor((remainSec % 3600) / 60);
  const s = remainSec % 60;
  const p2 = v => String(v).padStart(2, '0');

  const str = hasHours
    ? `${p2(h)}${p2(m)}${p2(s)}`
    : `${p2(m)}${p2(s)}`;
  const chars = [...str];

  // Animate changed digits
  const spans = Array.from(document.querySelectorAll('#lbl-time .digit'));
  chars.forEach((c, i) => {
    if (prevDigits[i] !== c) {
      spans[i].textContent = c;
      if (!instant) {
        spans[i].classList.remove('tick');
        void spans[i].offsetWidth; // force reflow for animation restart
        spans[i].classList.add('tick');
      }
    }
  });
  prevDigits = [...chars];

  // Color state — 20分以上: 残り3分/2分、5〜20分: 残り2分/1分、5分以下: 割合で切替
  const ratio = totalSec > 0 ? remainSec / totalSec : 0;
  let warnAt, dangerAt;
  if (totalSec >= 1200)    { warnAt = 180; dangerAt = 120; }
  else if (totalSec > 300) { warnAt = 120; dangerAt = 60; }
  else                     { warnAt = totalSec * 0.25; dangerAt = totalSec * 0.10; }
  const lbl  = document.getElementById('lbl-time');
  const ring = document.getElementById('ring-fill');

  let cls, colonColor;
  if (remainSec <= 0)             { cls = 't-done';   ring.style.stroke = 'var(--red)';   colonColor = 'var(--red)'; }
  else if (remainSec <= dangerAt) { cls = 't-danger'; ring.style.stroke = 'var(--red)';   colonColor = 'var(--red)'; }
  else if (remainSec <= warnAt)   { cls = 't-warn';   ring.style.stroke = 'var(--amber)'; colonColor = 'var(--amber)'; }
  else                            { cls = '';          ring.style.stroke = 'var(--ring)';  colonColor = 'var(--sep)'; }
  lbl.className = cls;
  document.querySelectorAll('#lbl-time .t-colon').forEach(el => el.style.color = colonColor);

  // Ring offset: 0 = full ring, RING_C = empty
  const offset = RING_C * (1 - ratio);
  if (instant) {
    // Skip transition on init / reset so it doesn't animate from previous state
    ring.style.transition = 'none';
    ring.style.strokeDashoffset = offset;
    void ring.offsetWidth;
    ring.style.transition = 'stroke-dashoffset 1s linear, stroke 0.9s ease';
  } else {
    ring.style.strokeDashoffset = offset;
  }
}

function onFinish() {
  document.getElementById('overlay').classList.add('show');
  playCanon();
}

// ── Audio: Pachelbel's Canon in D, improved music-box timbre ────────
function initAudio() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.52;
  masterGain.connect(audioCtx.destination);

  // Convolution reverb with pre-delay for depth
  reverbNode = audioCtx.createConvolver();
  reverbNode.buffer = makeImpulse(2.4, 3.2);
  reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.28;
  reverbNode.connect(reverbGain);
  reverbGain.connect(masterGain);
}

// Reverb impulse with pre-delay (first 25ms silence → natural room feel)
function makeImpulse(duration, decayRate) {
  const sr       = audioCtx.sampleRate;
  const len      = Math.floor(sr * duration);
  const preDelay = Math.floor(sr * 0.025);
  const buf      = audioCtx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      if (i < preDelay) { d[i] = 0; continue; }
      const t = (i - preDelay) / (len - preDelay);
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decayRate);
    }
  }
  return buf;
}

// ── Timbres ─────────────────────────────────────────────────────────
// harm: [周波数比, 音量, 減衰の速さ(1=本体と同じ, 小さいほど早く消える)]
const TIMBRES = {
  musicbox: {
    harm: [[1, 1, 1], [2, .28, 1], [3, .13, .34], [4, .055, .2]],
    attack: .003, settleLvl: .30, settleT: .055, ring: 2.4, ringMax: 3.2, detune: 4,
  },
  piano: {
    harm: [[1, 1, 1], [2, .40, .75], [3, .15, .5], [4, .06, .35], [5, .03, .22]],
    attack: .005, settleLvl: .55, settleT: .12, ring: 1.9, ringMax: 2.5, detune: 2,
  },
  chime: { // チューブラーベル風: 非整数倍音で澄んだ金属音
    harm: [[1, 1, 1], [2.74, .32, .65], [5.4, .10, .32], [8.93, .035, .18]],
    attack: .002, settleLvl: .45, settleT: .09, ring: 3.2, ringMax: 4.2, detune: 3,
  },
  marimba: { // 木の短い減衰
    harm: [[1, 1, 1], [3.9, .22, .28], [9.2, .05, .12]],
    attack: .002, settleLvl: .16, settleT: .05, ring: 1.0, ringMax: 1.3, detune: 3,
  },
  vibraphone: { // トレモロ付きの柔らかい金属音
    harm: [[1, 1, 1], [4, .16, .55], [10, .025, .18]],
    attack: .006, settleLvl: .55, settleT: .12, ring: 2.6, ringMax: 3.4, detune: 2,
    tremolo: 5.5,
  },
};

function playNote(freq, t, dur, vol) {
  if (!audioCtx || !masterGain) return;
  const cfg = TIMBRES[chosenSound] || TIMBRES.musicbox;

  // Humanize velocity ±8%
  const v = vol * (0.92 + Math.random() * 0.16);
  const ring = Math.min(dur * cfg.ring, cfg.ringMax);

  // Slight stereo spread per note
  const pan = audioCtx.createStereoPanner();
  pan.pan.value = (Math.random() - 0.5) * 0.35;

  const g = audioCtx.createGain();

  // 倍音を重ねて音色を作る
  const oscs = [];
  for (const [mult, hg, rf] of cfg.harm) {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq * mult;
    o.detune.value = (Math.random() - 0.5) * cfg.detune;
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(hg, t);
    if (rf < 1) og.gain.exponentialRampToValueAtTime(0.001, t + Math.max(ring * rf, 0.08));
    o.connect(og); og.connect(g);
    oscs.push(o);
  }

  // トレモロ（ビブラフォン用の音量ゆらぎ）
  let lfo = null;
  let out = g;
  if (cfg.tremolo) {
    const trem  = audioCtx.createGain();
    const depth = audioCtx.createGain();
    trem.gain.value  = 0.75;
    depth.gain.value = 0.25;
    lfo = audioCtx.createOscillator();
    lfo.frequency.value = cfg.tremolo;
    lfo.connect(depth); depth.connect(trem.gain);
    g.connect(trem);
    out = trem;
  }

  // Route: note → pan → dry + reverb
  out.connect(pan);
  pan.connect(masterGain);
  if (reverbNode) out.connect(reverbNode);

  // Envelope — strike, settle, ring-out
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(v, t + cfg.attack);
  g.gain.exponentialRampToValueAtTime(Math.max(v * cfg.settleLvl, 0.001), t + cfg.settleT);
  g.gain.exponentialRampToValueAtTime(0.001, t + ring);

  const stop = t + ring + 0.06;
  oscs.forEach(o => { o.start(t); o.stop(stop); });
  if (lfo) { lfo.start(t); lfo.stop(stop); musicNodes.push(lfo); }
  musicNodes.push(...oscs, pan);
}

// Canon parameters
const BPM = 72, Q = 60 / BPM, E = Q / 2;
const hz = n => 440 * Math.pow(2, n / 12); // equal temperament from A4

const N = {
  D3: hz(-27), FS3: hz(-23), G3: hz(-22), A3: hz(-20), B3: hz(-18),
  FS4: hz(-11), G4: hz(-10), A4: hz(-8),  B4: hz(-6),  CS5: hz(-4),
  D5:  hz(-3),  E5:  hz(-1), FS5: hz(1),  G5: hz(2),   A5: hz(4),
};

// Ground bass: D–A–B–F#–G–D–G–A  (classic ostinato)
const BASS = [
  [N.D3,Q,.22],[N.A3,Q,.22],[N.B3,Q,.22],[N.FS3,Q,.22],
  [N.G3,Q,.22],[N.D3,Q,.22],[N.G3,Q,.22],[N.A3,Q,.22],
];

// Melody — 8 bars (32 quarter-note beats); bass repeats 4× underneath
const MEL = [
  // Bars 1–4: quarter-note theme (most recognizable line)
  [N.FS5,Q,.52],[N.E5,Q,.52],[N.D5,Q,.52],[N.CS5,Q,.52],
  [N.B4,Q,.52],[N.A4,Q,.52],[N.B4,Q,.52],[N.CS5,Q,.52],
  [N.D5,Q,.52],[N.CS5,Q,.52],[N.B4,Q,.52],[N.A4,Q,.52],
  [N.G4,Q,.52],[N.FS4,Q,.52],[N.G4,Q,.52],[N.A4,Q,.52],
  // Bars 5–6: eighth-note ascending/descending runs
  [N.FS4,E,.44],[N.G4,E,.44],[N.A4,E,.44],[N.B4,E,.44],
  [N.CS5,E,.44],[N.D5,E,.44],[N.E5,E,.44],[N.FS5,E,.44],
  [N.G5,E,.44],[N.FS5,E,.44],[N.E5,E,.44],[N.D5,E,.44],
  [N.CS5,E,.44],[N.D5,E,.44],[N.B4,E,.44],[N.CS5,E,.44],
  // Bars 7–8
  [N.A4,E,.44],[N.B4,E,.44],[N.CS5,E,.44],[N.D5,E,.44],
  [N.E5,E,.44],[N.FS5,E,.44],[N.G5,E,.44],[N.A5,E,.44],
  [N.FS5,E,.44],[N.E5,E,.44],[N.D5,E,.44],[N.CS5,E,.44],
  [N.B4,E,.44],[N.CS5,E,.44],[N.A4,E,.44],[N.B4,E,.44],
];

function playCanon() {
  if (!audioCtx) return;
  const t0     = audioCtx.currentTime + 0.15;
  const melLen = MEL.reduce((a, [, d]) => a + d, 0);

  // Schedule melody
  let mt = t0;
  for (const [f, d, v] of MEL) { playNote(f, mt, d, v); mt += d; }

  // Schedule bass (repeats as needed to fill melody length)
  let bt = t0, bi = 0;
  while (bt < t0 + melLen - 0.01) {
    const [f, d, v] = BASS[bi++ % BASS.length];
    playNote(f, bt, d, v); bt += d;
  }

  musicTimeout = setTimeout(playCanon, (melLen - 0.12) * 1000);
}

function stopMusic() {
  clearTimeout(musicTimeout); musicTimeout = null;
  if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.15);
  setTimeout(() => {
    musicNodes.forEach(n => { try { n.stop(); } catch (_) {} });
    musicNodes = [];
    if (audioCtx) { audioCtx.close(); audioCtx = null; masterGain = null; reverbNode = null; reverbGain = null; }
  }, 700);
  document.getElementById('overlay').classList.remove('show');

  const lbl = document.getElementById('lbl-time');
  lbl.className = '';
  document.getElementById('ring-fill').style.stroke = 'var(--ring)';
  document.querySelectorAll('#lbl-time .t-colon').forEach(el => el.style.color = 'var(--sep)');
}

const FONT_STEPS = [0.6, 0.78, 1.0, 1.25, 1.55];
let fontStepIdx = 2;

function changeFont(dir) {
  fontStepIdx = Math.max(0, Math.min(FONT_STEPS.length - 1, fontStepIdx + dir));
  document.documentElement.style.setProperty('--digit-scale', FONT_STEPS[fontStepIdx]);
  document.getElementById('btn-font-down').disabled = fontStepIdx === 0;
  document.getElementById('btn-font-up').disabled   = fontStepIdx === FONT_STEPS.length - 1;
}
